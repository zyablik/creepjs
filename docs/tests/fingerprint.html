<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- this is to obtain fingerprint.json in chrome://version/fingerprint.html -->
    <script id="fingerprint_json" type="application/json">$i18nRaw{fingerprint}</script>

    <script type="text/javascript" type="module">

      async function collect_fp() {
        'use strict';
        let battery = (await navigator?.getBattery?.());

        let hasTouch = () => {
          try {
            return 'ontouchstart' in window && !!document.createEvent('TouchEvent')
          } catch (err) {
            return false
          }
        }

        function getStackSizeQuick() {
          let depth = 0;
          try {
            (function dive() {
              depth++;
              dive();
            })();
          } catch (e) {
            return {
              depth,
              errorName: e?.name || null,
              errorMessage: e?.message || null,
            };
          }
          return {
            depth,
            errorName: null,
            errorMessage: null,
          };
        }

        const hashMini = (x) => {
          const json = `${JSON.stringify(x)}`
          const hash = json.split('').reduce((hash, char, i) => {
            return Math.imul(31, hash) + json.charCodeAt(i) | 0
          }, 0x811c9dc5)
          return ('0000000' + (hash >>> 0).toString(16)).substr(-8)
        }

        function getNonNativeFunctions() {
          const checks = [
            ['navigator.permissions.query', () => navigator?.permissions?.query],
            ['HTMLCanvasElement.prototype.toDataURL', () => HTMLCanvasElement?.prototype?.toDataURL],
            ['CanvasRenderingContext2D.prototype.getImageData', () => CanvasRenderingContext2D?.prototype?.getImageData],
            ['WebGLRenderingContext.prototype.getParameter', () => WebGLRenderingContext?.prototype?.getParameter],
            ['RTCPeerConnection', () => globalThis.RTCPeerConnection],
            ['Notification.requestPermission', () => Notification?.requestPermission],
            ['MediaDevices.enumerateDevices', () => navigator?.mediaDevices?.enumerateDevices],
            ['speechSynthesis.getVoices', () => globalThis.speechSynthesis?.getVoices],
          ];

          const nonNative = [];

          for (const [name, getter] of checks) {
            try {
              const fn = getter();
              if (typeof fn !== 'function') continue;
              const src = Function.prototype.toString.call(fn);
              if (!src.includes('[native code]')) {
                nonNative.push(name);
              }
            } catch (e) {
              nonNative.push(`${name} (inspect error)`);
            }
          }

          return nonNative;
        }

        function hashBytes(bytes) {
          let hash = 0x811c9dc5;
          for (let i = 0; i < bytes.length; i++) {
            hash ^= bytes[i];
            hash = Math.imul(hash, 0x01000193);
          }
          return (hash >>> 0).toString(16).padStart(8, '0');
        }

        function collectCanvas2dHash() {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = 192;
            canvas.height = 128;
            const ctx = canvas.getContext('2d', {willReadFrequently: true});
            if (!ctx) return null;

            ctx.fillStyle = '#101418';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.37, '#feca57');
            gradient.addColorStop(0.63, '#48dbfb');
            gradient.addColorStop(1, '#5f27cd');
            ctx.fillStyle = gradient;
            ctx.fillRect(8, 8, 112, 112);

            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = 'rgba(20, 20, 20, 0.45)';
            ctx.beginPath();
            ctx.arc(44, 48, 24, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(84, 78, 28, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(10, 118);
            ctx.bezierCurveTo(28, 18, 100, 18, 118, 118);
            ctx.stroke();

            ctx.save();
            ctx.translate(64, 64);
            ctx.rotate(Math.PI / 7);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
            ctx.fillRect(-22, -22, 44, 44);
            ctx.restore();

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.textBaseline = 'alphabetic';

            ctx.font = '15px sans-serif';
            ctx.fillText('fp:sans-serif:wmMWil1O0@#', 10, 28);

            ctx.font = '15px serif';
            ctx.fillText('fp:serif:wmMWil1O0@#', 10, 52);

            ctx.font = '15px monospace';
            ctx.fillText('fp:monospace:wmMWil1O0@#', 10, 76);

            ctx.strokeStyle = 'rgba(255,255,255,0.65)';
            ctx.strokeRect(126.5, 14.5, 52, 52);
            ctx.beginPath();
            ctx.moveTo(126, 14);
            ctx.lineTo(178, 66);
            ctx.moveTo(178, 14);
            ctx.lineTo(126, 66);
            ctx.stroke();

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            return hashBytes(data);
          } catch (e) {
            return null;
          }
        }

        function collectCanvas3dHash() {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = 96;
            canvas.height = 96;
            const gl = canvas.getContext('webgl2', {
              alpha: false,
              antialias: false,
              depth: false,
              stencil: false,
              preserveDrawingBuffer: true,
            }) || canvas.getContext('webgl', {
              alpha: false,
              antialias: false,
              depth: false,
              stencil: false,
              preserveDrawingBuffer: true,
            });
            if (!gl) return null;

            const isWebGL2 = typeof WebGL2RenderingContext !== 'undefined' && gl instanceof WebGL2RenderingContext;
            const compileShader = (type, source) => {
              const shader = gl.createShader(type);
              gl.shaderSource(shader, source);
              gl.compileShader(shader);
              if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                const info = gl.getShaderInfoLog(shader);
                gl.deleteShader(shader);
                throw new Error(info || 'shader compile failed');
              }
              return shader;
            };

            const vertexSource = isWebGL2
              ? `#version 300 es
precision highp float;
in vec2 a_position;
out vec2 v_uv;
void main() {
  v_uv = (a_position + 1.0) * 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`
              : `precision highp float;
attribute vec2 a_position;
varying vec2 v_uv;
void main() {
  v_uv = (a_position + 1.0) * 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;

            const fragmentSource = isWebGL2
              ? `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outColor;
void main() {
  vec2 p = v_uv * 2.0 - 1.0;
  float radius = length(p);
  float wave = 0.5 + 0.5 * sin(p.x * 23.0 + p.y * 17.0);
  float ring = smoothstep(0.78, 0.76, radius);
  outColor = vec4(v_uv.x, wave, ring * (0.7 + 0.3 * cos(radius * 31.0)), 1.0);
}`
              : `precision highp float;
varying vec2 v_uv;
void main() {
  vec2 p = v_uv * 2.0 - 1.0;
  float radius = length(p);
  float wave = 0.5 + 0.5 * sin(p.x * 23.0 + p.y * 17.0);
  float ring = smoothstep(0.78, 0.76, radius);
  gl_FragColor = vec4(v_uv.x, wave, ring * (0.7 + 0.3 * cos(radius * 31.0)), 1.0);
}`;

            const program = gl.createProgram();
            const vs = compileShader(gl.VERTEX_SHADER, vertexSource);
            const fs = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
              throw new Error(gl.getProgramInfoLog(program) || 'program link failed');
            }

            gl.useProgram(program);
            const positionLoc = gl.getAttribLocation(program, 'a_position');
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
              -1, -1,
               1, -1,
              -1,  1,
               1,  1,
            ]), gl.STATIC_DRAW);
            gl.enableVertexAttribArray(positionLoc);
            gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.03, 0.04, 0.05, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            const pixels = new Uint8Array(canvas.width * canvas.height * 4);
            gl.readPixels(0, 0, canvas.width, canvas.height, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

            gl.deleteBuffer(buffer);
            gl.deleteShader(vs);
            gl.deleteShader(fs);
            gl.deleteProgram(program);

            return hashBytes(pixels);
          } catch (e) {
            return null;
          }
        }

        async function checkOfflineAudioContext() {
          'use strict';

          try {
            const AUDIO_TRAP = Math.random()

            const hashify = (x, algorithm = 'SHA-256') => {
              const json = `${JSON.stringify(x)}`
              const jsonBuffer = new TextEncoder().encode(json)
              return crypto.subtle.digest(algorithm, jsonBuffer).then((hashBuffer) => {
                const hashArray = Array.from(new Uint8Array(hashBuffer))
                const hashHex = hashArray.map((b) => ('00' + b.toString(16)).slice(-2)).join('')
                return hashHex
              })
            }

            async function hasFakeAudio() {
              const context = new OfflineAudioContext(1, 100, 44100)
              const oscillator = context.createOscillator()
              oscillator.frequency.value = 0
              oscillator.start(0)
              context.startRendering()

              return new Promise((resolve) => {
                context.oncomplete = (event) => {
                  const channelData = event.renderedBuffer.getChannelData?.(0)
                  if (!channelData) resolve(false)
                  resolve('' + [...new Set(channelData)] !== '0')
                }
              }).finally(() => oscillator.disconnect())
            }

            const bufferLen = 5000

            const context = new OfflineAudioContext(1, bufferLen, 44100)
            const oscillator = context.createOscillator()
            oscillator.type = 'triangle'
            oscillator.frequency.value = 10000

            const dynamicsCompressor = context.createDynamicsCompressor()
            dynamicsCompressor.threshold.value = -50
            dynamicsCompressor.knee.value = 40
            dynamicsCompressor.attack.value = 0

            const analyser = context.createAnalyser()
            const biquadFilter = context.createBiquadFilter()

            const values = {
              ['AnalyserNode.channelCount']: analyser.channelCount,
              ['AnalyserNode.channelCountMode']: analyser.channelCountMode,
              ['AnalyserNode.channelInterpretation']: analyser.channelInterpretation,
              ['AnalyserNode.context.sampleRate']: analyser.context.sampleRate,
              ['AnalyserNode.fftSize']: analyser.fftSize,
              ['AnalyserNode.frequencyBinCount']: analyser.frequencyBinCount,
              ['AnalyserNode.maxDecibels']: analyser.maxDecibels,
              ['AnalyserNode.minDecibels']: analyser.minDecibels,
              ['AnalyserNode.numberOfInputs']: analyser.numberOfInputs,
              ['AnalyserNode.numberOfOutputs']: analyser.numberOfOutputs,
              ['AnalyserNode.smoothingTimeConstant']: analyser.smoothingTimeConstant,
              ['AnalyserNode.context.listener.forwardX.maxValue']: analyser.context.listener.forwardX.maxValue,
              ['BiquadFilterNode.gain.maxValue']: biquadFilter.gain.maxValue,
              ['BiquadFilterNode.frequency.defaultValue']: biquadFilter.frequency.defaultValue,
              ['BiquadFilterNode.frequency.maxValue']: biquadFilter.frequency.maxValue,
              ['DynamicsCompressorNode.attack.defaultValue']: dynamicsCompressor.attack.defaultValue,
              ['DynamicsCompressorNode.knee.defaultValue']: dynamicsCompressor.knee.defaultValue,
              ['DynamicsCompressorNode.knee.maxValue']: dynamicsCompressor.knee.maxValue,
              ['DynamicsCompressorNode.ratio.defaultValue']: dynamicsCompressor.ratio.defaultValue,
              ['DynamicsCompressorNode.ratio.maxValue']: dynamicsCompressor.ratio.maxValue,
              ['DynamicsCompressorNode.release.defaultValue']: dynamicsCompressor.release.defaultValue,
              ['DynamicsCompressorNode.release.maxValue']: dynamicsCompressor.release.maxValue,
              ['DynamicsCompressorNode.threshold.defaultValue']: dynamicsCompressor.threshold.defaultValue,
              ['DynamicsCompressorNode.threshold.minValue']: dynamicsCompressor.threshold.minValue,
              ['OscillatorNode.detune.maxValue']: oscillator.detune.maxValue,
              ['OscillatorNode.detune.minValue']: oscillator.detune.minValue,
              ['OscillatorNode.frequency.defaultValue']: oscillator.frequency.defaultValue,
              ['OscillatorNode.frequency.maxValue']: oscillator.frequency.maxValue,
              ['OscillatorNode.frequency.minValue']: oscillator.frequency.minValue,
            }

            oscillator.connect(dynamicsCompressor)
            dynamicsCompressor.connect(analyser)
            dynamicsCompressor.connect(context.destination)

            oscillator.start(0)
            const buffer = await context.startRendering()

            dynamicsCompressor.disconnect()
            oscillator.disconnect()

            const floatFrequencyData = new Float32Array(analyser.frequencyBinCount)
            analyser.getFloatFrequencyData(floatFrequencyData)
            const floatTimeDomainData = new Float32Array(analyser.fftSize)
            analyser.getFloatTimeDomainData(floatTimeDomainData)

            const floatFrequencyDataSum = floatFrequencyData.reduce((acc, curr) => (acc += Math.abs(curr)), 0)
            const floatTimeDomainDataSum = floatTimeDomainData.reduce((acc, curr) => (acc += Math.abs(curr)), 0)

            const compressorGainReduction = dynamicsCompressor.reduction?.value || dynamicsCompressor.reduction

            const getSnapshot = (arr, start, end) => {
              const collection = []
              for (let i = start; i < end; i++) collection.push(arr[i])
              return collection
            }

            const getSum = (arr) => !arr ? 0 : [...arr].reduce((acc, curr) => (acc += Math.abs(curr)), 0)

            const copy = new Float32Array(bufferLen)
            let bins = new Float32Array()
            if (buffer) {
              buffer.copyFromChannel?.(copy, 0)
              bins = buffer.getChannelData?.(0) || []
            }

            const copySample = getSnapshot([...copy], 4500, 4600)
            const binsSample = getSnapshot([...bins], 4500, 4600)
            const sampleSum = getSum(getSnapshot([...bins], 4500, bufferLen))

            const copyFromChannelSupported = ('copyFromChannel' in AudioBuffer.prototype)
            const matching = '' + binsSample == '' + copySample

            let lied = false
            const audioIsFake = await hasFakeAudio().catch(() => false)
            if (audioIsFake) lied = true

            if (copyFromChannelSupported && !matching) lied = true

            const totalUniqueSamples = new Set([...bins]).size

            const getRandFromRange = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min

            const getCopyFrom = (rand, buffer, copy) => {
              const length = buffer.length

              const max = 20
              const start = getRandFromRange(275, length - (max + 1))
              const mid = start + max / 2
              const end = start + max

              buffer.getChannelData(0)[start] = rand
              buffer.getChannelData(0)[mid] = rand
              buffer.getChannelData(0)[end] = rand
              buffer.copyFromChannel(copy, 0)
              const attack = [
                buffer.getChannelData(0)[start] === 0 ? Math.random() : 0,
                buffer.getChannelData(0)[mid] === 0 ? Math.random() : 0,
                buffer.getChannelData(0)[end] === 0 ? Math.random() : 0,
              ]
              return [...new Set([...buffer.getChannelData(0), ...copy, ...attack])].filter((x) => x !== 0)
            }

            const getCopyTo = (rand, buffer, copy) => {
              buffer.copyToChannel(copy.map(() => rand), 0)
              const frequency = buffer.getChannelData(0)[0]
              const dataAttacked = [...buffer.getChannelData(0)].map((x) => x !== frequency || !x ? Math.random() : x)
              return dataAttacked.filter((x) => x !== frequency)
            }

            const getNoiseFactor = () => {
              const length = 2000
              try {
                const result = [...new Set([
                  ...getCopyFrom(
                    AUDIO_TRAP,
                    new AudioBuffer({ length, sampleRate: 44100 }),
                    new Float32Array(length)),
                  ...getCopyTo(
                    AUDIO_TRAP,
                    new AudioBuffer({ length, sampleRate: 44100 }),
                    new Float32Array(length)),
                ])]
                return +(
                  result.length !== 1 &&
                  result.reduce((acc, n) => acc += +n, 0))
              } catch (error) {
                return 0
              }
            }

            const noiseFactor = getNoiseFactor()
            const noise = (
              noiseFactor || [...new Set(bins.slice(0, 100))]
                .reduce((acc, n) => acc += n, 0))
            if (noise) lied = true

            const offlineAudioContext = {
              totalUniqueSamples,
              compressorGainReduction,
              floatFrequencyDataSum,
              floatTimeDomainDataSum,
              sampleSum,
              values,
              noise,
              lied,
            }

            const hash = await hashify({
              ...offlineAudioContext,
              binsSample,
              copySample: copyFromChannelSupported ? copySample : [undefined],
            })

            return {
              ...offlineAudioContext,
              hash,
            }
          } catch (e) {
            return {
              errorName: e?.name || null,
              errorMessage: e?.message || null,
            }
          }
        }

        try {
          let fp = {
            navigator: {
              schemaVersion: 2,
              userAgent: navigator?.userAgent,

              userAgentData: (await navigator?.userAgentData?.getHighEntropyValues(
                ['architecture', 'bitness', 'formFactors', 'fullVersionList', 'model', 'platformVersion', 'uaFullVersion', 'wow64' ])), // brands, mobile, platform

              platform: navigator?.platform,

              webdriver: navigator?.webdriver,
              appVersion: navigator?.appVersion,
              deviceMemory: navigator?.deviceMemory,
              hardwareConcurrency: navigator?.hardwareConcurrency,
              language: navigator?.language,
              languages: navigator?.languages,
              maxTouchPoints: navigator?.maxTouchPoints,
              onLine: navigator?.onLine,

              vendor: navigator?.vendor,

              connection: {
                downlink: navigator?.connection?.downlink,
                downlinkMax: (navigator?.connection?.downlinkMax == Infinity ? 1e308 : (navigator?.connection?.downlinkMax || navigator?.connection?.downlink)),
                effectiveType: "k" + navigator?.connection?.effectiveType?.toUpperCase(),
                rtt: navigator?.connection?.rtt,
                saveData: navigator?.connection?.saveData,
                type: navigator?.connection?.type || "unknown",
              },

              plugings: [],
              mimeTypes: [],

              battery: {
                charging: battery?.charging,
                level: battery?.level,
                chargingTime: battery?.chargingTime == Infinity ? 1e308 : battery?.chargingTime,
                dischargingTime: battery?.dischargingTime == Infinity ? 1e308 : battery?.dischargingTime,
              },

              bluetooth: {
                bluetooth: String(navigator.bluetooth),
                availability: (await navigator.bluetooth?.getAvailability?.())
              },

              storage: {
                storage: String(navigator.storage),
                quota: (await navigator?.storage?.estimate?.())?.quota,
                usage: (await navigator?.storage?.estimate?.())?.usage,
              },

              mediaDevices: [],

              gpu: {
                info: {},
                features: [],
                limits: {},
                status: "N/A"
              },

              properties: Object.getOwnPropertyNames(Object.getPrototypeOf(navigator)),
            },

            performance: {
              stackSize: getStackSizeQuick(),
              memory: {
                jsHeapSizeLimit: performance?.memory?.jsHeapSizeLimit,
                totalJSHeapSize: performance?.memory?.totalJSHeapSize,
                usedJSHeapSize: performance?.memory?.usedJSHeapSize,
              }
            },

            screen: {
              orientation: {
                type: screen?.orientation?.type?.replace(/-/, "_"),
                angle: screen?.orientation?.angle,
              },
              availHeight: screen.availHeight,
              availWidth: screen.availWidth,
              pixelDepth: screen.pixelDepth,
              height: screen.height,
              width: screen.width,
              availTop: screen.availTop,
              availLeft: screen.availLeft,
              colorDepth: screen.colorDepth,

              innerWidth: window.innerWidth,
              innerHeight: window.innerHeight,
              outerWidth: window.outerWidth,
              outerHeight: window.outerHeight,
              screenX: window.screenX,
              screenY: window.screenY,
              devicePixelRatio: window.devicePixelRatio,

              visualViewport: {
                width: window.visualViewport?.width,
                height: window.visualViewport?.height,
              },

              domRectViewport: {
                width: document.body.getBoundingClientRect().width,
                height: document.body.getBoundingClientRect().height,
              },

              documentElement: {
                clientWidth: document?.documentElement?.clientWidth,
                clientHeight: document?.documentElement?.clientHeight,
              }
            },

            misc: {
              window_chrome: String(window.chrome),
              chrome_runtime: String(window?.chrome?.runtime),
              chrome_app: String(window?.chrome?.app),
              window_ontouchstart: String(window.ontouchstart),
              touch_event: hasTouch(),
              window_keys: Object.getOwnPropertyNames(window),
              nonNativeFunctions: [],
            },

            intl: {
              date: (new Date()),
              locale: (new Intl.Collator)?.resolvedOptions?.()?.locale,
              toLocaleString_undefined: (1).toLocaleString?.(undefined, { style: 'currency', currency: 'USD', currencyDisplay: 'name'}),
              toLocaleString_lang: (1).toLocaleString?.(navigator.language, { style: 'currency', currency: 'USD', currencyDisplay: 'name'}),

              timezone: Intl.DateTimeFormat()?.resolvedOptions?.().timeZone,
              offset: (new Date()).getTimezoneOffset?.(),
            },

            webgl: {
              parameters: {},
              extensions_gl1: [],
              extensions_gl2: [],
              precisions: {},
              status: "N/A"
            },

            permissions: {},

            sensors: {},

            fps: null,

            canvas_hash_2d: null,
            canvas_hash_3d: null,

            webgl_hash: null,
            webgl_hash_with_model: null,

            drm: "default",

            voices: [],

            offlineAudioContext: null,

            audioCodecs: {},
            videoCodecs: {},

            mediaSourceCodecs: [],
            mediaRecoderCodecs: [],

            webrtc: {
              offer: {
                audio: {
                  media_line: null,
                  rtpmap_lines: []
                },

                video: {
                  media_line: null,
                  rtpmap_lines: []
                },
              },

              addresses: null,
              sdp: null,
              connectionLineIpAddress: null,
              candidateIpAddress: null,
            },

            fonts: [],
          };

          fp.navigator.plugins = Array.from(navigator.plugins || []).map((p) => ({
            name: p.name,
            filename: p.filename,
            description: p.description,
            mimeTypes: Array.from(p || []).map(mt => ({
              type: mt.type,
              description: mt.description,
              suffixes: mt.suffixes
            }))
          }));

          fp.navigator.mimeTypes = Array.from(navigator.mimeTypes || []).map(mt => ({
            type: mt.type,
            description: mt.description,
            suffixes: mt.suffixes,
            enabledPlugin: mt.enabledPlugin && mt.enabledPlugin.name ? mt.enabledPlugin.name : null
          }));

          let media_devices = await navigator?.mediaDevices?.enumerateDevices?.() || [];

          fp.navigator.mediaDevices = media_devices.map((d) => ({
            deviceId: d.deviceId,
            groupId: d.groupId,
            kind: d.kind,
            label: d.label
          }));

          // webgpu
          let gpu_adapter = await navigator.gpu?.requestAdapter?.()
          if(gpu_adapter) {
            for (let key in gpu_adapter?.info) {
              fp.navigator.gpu.info[key] = gpu_adapter.info[key]
            }

            for (let key in gpu_adapter?.limits) {
              fp.navigator.gpu.limits[key] = gpu_adapter.limits[key]
            }

            fp.navigator.gpu.features = Array.from(gpu_adapter?.features)
            fp.navigator.gpu.status = 'found';
          }
        fp.navigator.properties_hash = hashMini(fp.navigator.properties);
        fp.navigator.properties_version_hash = hashMini({p: fp.navigator.properties, v: fp.navigator.userAgentData?.uaFullVersion });

        fp.misc.window_keys_hash = hashMini(fp.misc.window_keys);
        fp.misc.window_keys_version_hash = hashMini({k: fp.misc.window_keys, v: fp.navigator.userAgentData?.uaFullVersion });
        fp.misc.nonNativeFunctions = getNonNativeFunctions();
        fp.canvas_hash_2d = collectCanvas2dHash();
        fp.canvas_hash_3d = collectCanvas3dHash();

        // webgl
        let canvas2 = document.createElement("canvas");
        let gl2_context = canvas2.getContext("webgl2");
        if(gl2_context) {
          fp.webgl.status = 'webgl2';
          fp.webgl.extensions_gl2 = gl2_context.getSupportedExtensions();

          ["ALIASED_LINE_WIDTH_RANGE", "ALIASED_POINT_SIZE_RANGE"].forEach(key => {
            try {
              let range = gl2_context.getParameter(gl2_context[key])
              fp.webgl.parameters[key] = {min: range[0], max: range[1]}
            } catch (e) {
              fp.webgl.parameters[key] = null

        function get_fps() {
          return new Promise((resolve) => {
            let done = false;
            const frameTimes = [];
            const finish = (timeout = false) => {
              if (done) return;
              done = true;
              if (!frameTimes.length) {
                resolve({ frames: 0, error: timeout ? 'timeout' : 'no frames' });
                return;
              }
              const sortedSamples = [...frameTimes].sort((a, b) => a - b);
              const trimmedSamples = sortedSamples.length > 2 ? sortedSamples.slice(1, -1) : sortedSamples;
              const sum = trimmedSamples.reduce((a, b) => a + b, 0);
              const avg = sum / trimmedSamples.length;
              const mid = Math.floor(trimmedSamples.length / 2);
              const median = trimmedSamples.length % 2
                ? trimmedSamples[mid]
                : (trimmedSamples[mid - 1] + trimmedSamples[mid]) / 2;
              resolve({
                frames: frameTimes.length,
                avgFrameTime: +avg.toFixed(2),
                medianFrameTime: +median.toFixed(2),
                minFrameTime: +trimmedSamples[0].toFixed(2),
                maxFrameTime: +trimmedSamples[trimmedSamples.length - 1].toFixed(2),
                avgFps: Math.round(1000 / avg),
                medianFps: Math.round(1000 / median),
                ...(timeout ? { error: 'timeout' } : {}),
              });
            };
            let prev = performance.now();
            const timeoutId = setTimeout(() => finish(true), 2000);
            const measure = (now) => {
              if (done) return;
              frameTimes.push(now - prev);
              prev = now;
              if (frameTimes.length < 20) {
                requestAnimationFrame(measure);
              } else {
                clearTimeout(timeoutId);
                finish(false);
              }
            };
            requestAnimationFrame(measure);
          });
        }

              prev = s;
              const next = s.replace(
                new RegExp(`(?:\\s+(?:${faceTokens.join("|")}))+$`, "i"),
                ""
              ).trim();
              if (next && next !== s) {

                out.push(s);

        str += `<tr><td>webgl_hash</td><td>${JSON.stringify(fp.webgl_hash)}</td></tr>`

        );

        const astats = Object.values(fp.audioCodecs).reduce((acc, v) => (acc[v]++, acc), {probably: 0, maybe: 0});

        document.getElementById("hash_4").innerHTML = `current hash = ${fingerprint4.hash} prev hash = ${prev_fingerprint4_hash}`

      });

      const hashMini = (x) => {
        const json = `${JSON.stringify(x)}`
        const hash = json.split('').reduce((hash, char, i) => {
          return Math.imul(31, hash) + json.charCodeAt(i) | 0
        }, 0x811c9dc5)
        return ('0000000' + (hash >>> 0).toString(16)).substr(-8)
      }

      function generateCanvas2dFingerprint(canvas) {
        const ctx = canvas.getContext('2d');

        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#069';
        ctx.fillText('Canvas Fingerprint: @' + new Date().toISOString(), 5, 15);

        ctx.strokeStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width, 0);
        ctx.stroke();

        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#f00');
        gradient.addColorStop(0.5, '#0f0');
        gradient.addColorStop(1, '#00f');
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const dataURL = canvas.toDataURL();

        return {
          dataURL: dataURL,
          hash: hashMini(dataURL),
          details: {
            renderer: ctx.getContextAttributes(),
            textMetrics: ctx.measureText('Test'),
            supported: {
              filter: typeof ctx.filter !== 'undefined',
              textDrawing: typeof ctx.fillText !== 'undefined'
            }
          }
        };
      }

      function generateCanvas3dFingerprint(canvas) {
        gl = canvas.getContext('webgl2')
        gl.clearColor(0.47, 0.7, 0.78, 1)
        gl.clear(gl.COLOR_BUFFER_BIT)
        dataURL = gl.canvas.toDataURL()
        // console.log(dataURL)
        const pixels = new Uint8Array(canvas.width * canvas.height * 4)
        gl.readPixels(0, 0, canvas.width, canvas.height, gl.RGBA, gl.UNSIGNED_BYTE, pixels)
        // console.log(pixels.toBase64())
        return {
          dataURL: pixels.toBase64(),
          hash: hashMini(pixels.toBase64()),
        };
      }
