        async function get_ice_addresses(connection) {
          return new Promise((resolve) => {
            let addresses = []
            setTimeout(() => { return resolve(["timeout"]) }, 1000)

            connection.onicecandidate = (event) => {
              if(event.candidate) {
                addresses.push(event.candidate.address)
              } else {
                connection.onicecandidate = null
                resolve(addresses)
              }
            }
          })
        }

        let config = {
          iceCandidatePoolSize: 1,
          iceServers: [{ urls: [ 'stun:stun4.l.google.com:19302', 'stun:stun3.l.google.com:19302']}],
        }

        let connection = new RTCPeerConnection(config)
        connection.createDataChannel('')
        let offer = await connection.createOffer({ offerToReceiveAudio: 1, offerToReceiveVideo: 1 })
        connection.setLocalDescription(offer)

        let m = offer.sdp.match(new RegExp(/m=audio [^\s]+ [^\s]+ ([^\n|\r]+)/)) || []
        fp.webrtc.offer.audio.media_line = m[0]
        let adescs = m[1]?.split(' ')

        adescs?.forEach(adesc => {
          fp.webrtc.offer.audio.rtpmap_lines.push(...(offer.sdp.match(RegExp(`a=(rtpmap|fmtp|rtcp-fb):${adesc} (.+)`, 'g'))))
        });

        m = offer.sdp.match(new RegExp(/m=video [^\s]+ [^\s]+ ([^\n|\r]+)/)) || []
        fp.webrtc.offer.video.media_line = m[0]
        let vdescs = m[1]?.split(' ')

        })

        let ice_promise = get_ice_addresses(connection);

          fp.webrtc.connectionLineIpAddress = connection.localDescription.sdp.match(/c=IN\s.+\s/i)?.[0].trim()
          fp.webrtc.candidateIpAddress = connection.localDescription.sdp.match(/(udp|tcp)\s(\d|\w)+\s((\d|\w|(\.|\:))+)(?=\s)/i)?.[0]
          try { connection.close(); } catch(e){}

        fp.mediaSourceCodecs.sort()

        // ----

        await Promise.all([ice_promise, fonts_promise]);

        return fp;

        // 1. Компактная логика рекурсивного сравнения (с Histogram Diff для массивов)
        function histogram_diff(a, b, path = '', out = []) {
          if (a === b) return out;
          if (Array.isArray(a) && Array.isArray(b) && (typeof a[0] === 'string' || typeof b[0] === 'string')) {
            // Внутренняя рекурсивная функция Гистограммного дифа
            const histo = (a0, a1, b0, b1) => {
              if (a0 >= a1 && b0 >= b1) return;

              // Строим гистограмму (частотность) элементов массива A в текущем окне
              let counts = new Map();
              for (let i = a0; i < a1; i++) counts.set(a[i], (counts.get(a[i]) || 0) + 1);

              // Ищем "лучший" якорь: элемент с наименьшей частотностью и наибольшей длиной совпадения
              let bestLcs = 0, bestA = -1, bestB = -1, minCnt = Infinity;
              for (let j = b0; j < b1; j++) {
                let cnt = counts.get(b[j]);
                if (cnt && cnt <= minCnt) {
                  for (let i = a0; i < a1; i++) {
                    if (a[i] === b[j]) {
                      let l = 0;
                      while (i + l < a1 && j + l < b1 && a[i + l] === b[j + l]) l++;
                      if (cnt < minCnt || (cnt === minCnt && l > bestLcs)) {
                        minCnt = cnt; bestLcs = l; bestA = i; bestB = j;
                      }
                    }
                  }
                }
              }

              if (bestLcs > 0) {
                // Нашли якорь — рекурсивно обрабатываем слева и справа от него
                histo(a0, bestA, b0, bestB);
                histo(bestA + bestLcs, a1, bestB + bestLcs, b1);
              } else {
                // Якорей нет (полное несовпадение). Применяем эвристику по префиксу.
                let i = a0, j = b0;
                while (i < a1 || j < b1) {
                  let s1 = i < a1 ? a[i] : undefined, s2 = j < b1 ? b[j] : undefined;
                  let p1 = s1 ? String(s1).split(/[ =:]/)[0] : "", p2 = s2 ? String(s2).split(/[ =:]/)[0] : "";

                  if (s1 !== undefined && s2 !== undefined && p1 === p2 && p1) {
                    out.push([`${path}[${i}]`, s1, s2]); i++; j++; // Изменено
                  } else if (s1 !== undefined) {
                    out.push([`${path}[${i}]`, s1, undefined]); i++; // Удалено
                  } else {
                    out.push([`${path}[${j}]`, undefined, s2]); j++; // Добавлено
                  }
                }
              }
            };

            // Запускаем алгоритм на всю длину массивов
            histo(0, a.length, 0, b.length);
          } else if (a && b && typeof a === 'object') {
            new Set([...Object.keys(a), ...Object.keys(b)]).forEach(k =>
              histogram_diff(a[k], b[k], Array.isArray(a) ? `${path}[${k}]` : (path ? `${path}.${k}` : k), out)
            );
          } else {
            out.push([path || 'root', a, b]);
          }
          return out;
        }

        // 2. Функция подсветки (без изменений)
        function highlight_diff(v0, v1) {
          'use strict';
          let s0 = v0 !== undefined ? JSON.stringify(v0) : "", s1 = v1 !== undefined ? JSON.stringify(v1) : "";

          if (v1 === undefined) return [`<b style="background:#ffb3ba">${s0}</b>`, "", "#ffdce0"];
          if (v0 === undefined) return ["", `<b style="background:#cdffd8">${s1}</b>`, "#cdffd8"];

          let start = 0, end0 = s0.length, end1 = s1.length;
          while (s0[start] === s1[start] && start < end0) start++;
          while (s0[end0-1] === s1[end1-1] && end0 > start && end1 > start) { end0--; end1--; }

          let pre = s0.slice(0, start), suf = s0.slice(end0);
          return [
            `${pre}<b style="background:#ffb3ba">${s0.slice(start, end0)}</b>${suf}`,
            `${pre}<b style="background:#a3f7bf">${s1.slice(start, end1)}</b>${suf}`,
            "#fff3cd"
          ];
        }

      function detectInstalledFonts(fontNames) {
        const testString = 'mmmmmmmmmwwwwwww0123456789абвгдABCD'; // чтобы ширина была чувствительной
        const testSize = '72px'; // побольше — разница заметнее
        const body = document.body || document.documentElement;

        const span = document.createElement('span');
        span.textContent = testString;
        span.style.fontSize = testSize;
        span.style.position = 'absolute';
        span.style.left = '-9999px';
        span.style.top = '-9999px';
        span.style.whiteSpace = 'nowrap';

        const baseMetrics = {};
        body.appendChild(span);

        // Сначала меряем базовые шрифты
        const BASE_FONTS = ['monospace', 'sans-serif', 'serif'];

        BASE_FONTS.forEach(base => {
            span.style.fontFamily = base;
            const rect = span.getBoundingClientRect();
            baseMetrics[base] = { width: rect.width, height: rect.height };
        });

        const result = {};

        fontNames.forEach(name => {
          let isInstalled = false;

          for (const base of BASE_FONTS) {
            span.style.fontFamily = `"${name}",${base}`;
            const rect = span.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;

            const baseRect = baseMetrics[base];
            // Если размеры отличаются от базового — значит, подставился настоящий шрифт
            if (w !== baseRect.width || h !== baseRect.height) {
                isInstalled = true;
                break;
            }
          }

          result[name] = isInstalled;
        });

        span.remove();
        return result;
      }

        const hash = json.split('').reduce((hash, char, i) => {
          return Math.imul(31, hash) + json.charCodeAt(i) | 0
        }, 0x811c9dc5)
        return ('0000000' + (hash >>> 0).toString(16)).substr(-8)
      }

      function generateCanvasFingerprint(canvas) {
        const ctx = canvas.getContext('2d');

        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#069';
        ctx.fillText('Canvas Fingerprint: @' + new Date().toISOString(), 5, 15);

        ctx.strokeStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width, 0);
        ctx.stroke();

        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#f00');
        gradient.addColorStop(0.5, '#0f0');
        gradient.addColorStop(1, '#00f');
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const dataURL = canvas.toDataURL();

        function simpleHash(str) {
          let hash = 0;
          for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = (hash << 5) - hash + char;
            hash |= 0;
          }
          return Math.abs(hash).toString(16);
        }

        return {
          dataURL: dataURL,
          hash: simpleHash(dataURL),
          details: {
            renderer: ctx.getContextAttributes(),
            textMetrics: ctx.measureText('Test'),
            supported: {
              filter: typeof ctx.filter !== 'undefined',
              textDrawing: typeof ctx.fillText !== 'undefined'
            }
          }
        };
      }
    </script>
